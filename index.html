<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Glass Currency Converter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon: #00d4ff;
            --neon-glow: rgba(0, 212, 255, 0.4);
            --bg: #0b0f1a;
            --glass: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text);
        }

        /* Decorative Blobs */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #00d4ff, #7000ff);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.25;
            animation: drift 15s infinite alternate ease-in-out;
        }

        @keyframes drift {
            from { transform: translate(-20%, -20%) scale(1); }
            to { transform: translate(20%, 20%) scale(1.1); }
        }

        /* Glass Card */
        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        h1 span { color: var(--neon); text-shadow: 0 0 10px var(--neon-glow); }

        .field { margin-bottom: 20px; }
        label { display: block; color: var(--text-dim); font-size: 0.8rem; margin-bottom: 8px; text-transform: uppercase; }

        input, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--neon); background: rgba(255, 255, 255, 0.12); }

        .row { display: flex; align-items: flex-end; gap: 12px; margin-bottom: 25px; }
        .dropdown { flex: 1; position: relative; }
        
        .select-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 0 12px;
        }

        .select-box img { width: 24px; height: 16px; border-radius: 2px; }
        .select-box select { border: none; background: transparent; }

        #swap {
            background: var(--neon);
            color: #000;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            cursor: pointer;
            display: grid;
            place-items: center;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        #swap:hover { transform: scale(1.1) rotate(180deg); box-shadow: 0 0 15px var(--neon-glow); }

        /* Result Area */
        .display {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin-top: 10px;
        }

        #rate-sub { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 5px; }
        #final-amount { font-size: 2.2rem; font-weight: 800; color: var(--neon); }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--neon);
            border-radius: 50%;
            width: 24px; height: 24px;
            animation: spin 0.8s linear infinite;
            margin: 10px auto;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 450px) {
            .row { flex-direction: column; align-items: stretch; }
            #swap { align-self: center; transform: rotate(90deg); margin: 5px 0; }
            #swap:hover { transform: scale(1.1) rotate(270deg); }
        }
    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="container">
        <h1>X-Change <span>Pro</span></h1>

        <div class="field">
            <label>Amount</label>
            <input type="number" id="amount" value="1.00">
        </div>

        <div class="row">
            <div class="dropdown">
                <label>From</label>
                <div class="select-box">
                    <img src="https://flagsapi.com/US/flat/64.png" id="from-flag">
                    <select id="from-cur"></select>
                </div>
            </div>

            <button id="swap"><i class="fas fa-exchange-alt"></i></button>

            <div class="dropdown">
                <label>To</label>
                <div class="select-box">
                    <img src="https://flagsapi.com/IN/flat/64.png" id="to-flag">
                    <select id="to-cur"></select>
                </div>
            </div>
        </div>

        <div class="display">
            <div id="loader" class="loader"></div>
            <div id="result-ui">
                <p id="rate-sub">Getting rates...</p>
                <h2 id="final-amount">--</h2>
            </div>
        </div>
    </div>

    <script>
        // List of common currencies and their country codes for flags
        const currencies = {
            "USD": "US", "EUR": "FR", "GBP": "GB", "INR": "IN", "AUD": "AU", "CAD": "CA", 
            "SGD": "SG", "JPY": "JP", "AED": "AE", "CNY": "CN", "BRL": "BR", "ZAR": "ZA"
        };

        const fromSelect = document.getElementById('from-cur');
        const toSelect = document.getElementById('to-cur');
        const amountInput = document.getElementById('amount');
        const finalAmount = document.getElementById('final-amount');
        const rateSub = document.getElementById('rate-sub');
        const loader = document.getElementById('loader');
        const resultUI = document.getElementById('result-ui');

        // Populate dropdowns
        Object.keys(currencies).forEach(cur => {
            fromSelect.add(new Option(cur, cur));
            toSelect.add(new Option(cur, cur));
        });

        fromSelect.value = "USD";
        toSelect.value = "INR";

        async function convert() {
            const amount = amountInput.value;
            const from = fromSelect.value;
            const to = toSelect.value;

            if (amount <= 0 || amount === "") return;

            loader.style.display = "block";
            resultUI.style.opacity = "0";

            try {
                // Using ExchangeRate-API (Free Tier - no key required for this specific demo URL)
                const response = await fetch(`https://open.er-api.com/v6/latest/${from}`);
                const data = await response.json();
                
                if (data.result === "success") {
                    const rate = data.rates[to];
                    const converted = (amount * rate).toFixed(2);
                    
                    rateSub.innerText = `1 ${from} = ${rate.toFixed(4)} ${to}`;
                    finalAmount.innerText = `${new Intl.NumberFormat().format(converted)} ${to}`;
                } else {
                    throw new Error("API Error");
                }
            } catch (error) {
                rateSub.innerText = "Error fetching data";
                finalAmount.innerText = "Check Connection";
            } finally {
                loader.style.display = "none";
                resultUI.style.opacity = "1";
            }
        }

        function updateFlag(select, imgId) {
            const code = currencies[select.value];
            document.getElementById(imgId).src = `https://flagsapi.com/${code}/flat/64.png`;
        }

        // Listeners
        fromSelect.addEventListener('change', () => { updateFlag(fromSelect, 'from-flag'); convert(); });
        toSelect.addEventListener('change', () => { updateFlag(toSelect, 'to-flag'); convert(); });
        amountInput.addEventListener('input', convert);
        
        document.getElementById('swap').addEventListener('click', () => {
            const temp = fromSelect.value;
            fromSelect.value = toSelect.value;
            toSelect.value = temp;
            updateFlag(fromSelect, 'from-flag');
            updateFlag(toSelect, 'to-flag');
            convert();
        });

        // Initial call
        window.onload = convert;
    </script>
</body>
</html>
